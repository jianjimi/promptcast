# 本机一键起：Postgres + 同步后端。
#   docker compose up --build
# 后端启动会跑 prisma migrate deploy，自动建表 + 序列。
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: promptcast
      POSTGRES_PASSWORD: promptcast
      POSTGRES_DB: promptcast
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptcast -d promptcast"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://promptcast:promptcast@postgres:5432/promptcast?schema=public"
      NODE_ENV: "production"
      # 必须在 server/.env 里设置一个强随机密钥（否则 compose 拒绝启动）。
      # 生成：  openssl rand -hex 32   或   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      JWT_SECRET: "${JWT_SECRET:?请在 server/.env 设置强随机 JWT_SECRET 再 up}"
      ACCESS_TOKEN_TTL: "${ACCESS_TOKEN_TTL:-900s}"
      REFRESH_TOKEN_TTL_DAYS: "${REFRESH_TOKEN_TTL_DAYS:-30}"
      PORT: "3000"
    ports:
      - "3000:3000"

volumes:
  pgdata:
